name: freelance_interconnect
description: "Freelance Interconnect — Africa's Premier Freelance Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Icon-App-72x72@1x.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/Icon-App-72x72@1x.png"
  android_12:
    image: "assets/images/Icon-App-72x72@1x.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
